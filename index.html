<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Todo App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<div class="top">

<h1>🚀 Smart Todo</h1>

<button id="theme">
🌙
</button>

</div>


<p class="tag">
Manage your tasks efficiently ✨
</p>



<form id="form">


<input 
id="input"
type="text"
placeholder="Write your task..."
required
>


<button>
Add
</button>


</form>




<div class="stats">


<p>
Total:
<span id="total">0</span>
</p>


<p>
Done:
<span id="done">0</span>
</p>


<p>
Left:
<span id="left">0</span>
</p>


</div>





<div class="progress">


<div id="bar"></div>


</div>





<ul id="list"></ul>




<div id="success-message">


🎉 You completed all today's tasks! Enjoy 😊


</div>



</div>



<script src="script.js"></script>


</body>

</html>
